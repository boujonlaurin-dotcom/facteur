name: Promote to Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/staging --ff-only
          git push origin main

  smoke-test:
    needs: promote
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deployment
        run: sleep 60

      - name: Health check (liveness)
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://facteur-production.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Liveness check failed after 10 attempts"
          exit 1

      - name: Readiness check (database)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://facteur-production.up.railway.app/api/health/ready)
          if [ "$STATUS" = "200" ]; then
            echo "Readiness check passed (DB connected)"
          else
            echo "WARNING: Readiness check returned $STATUS (DB may not be ready)"
            exit 1
          fi
