name: Production Smoke Tests

on:
  # Hebdo : quand la branche production avance (Railway auto-deploys via webhook).
  # NB: l'avancée faite par weekly-release.yml utilise le GITHUB_TOKEN, qui ne
  # re-déclenche PAS ce workflow — d'où le smoke prod intégré à weekly-release.yml.
  push:
    branches: [production]

  # Manual trigger for ad-hoc verification
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deployment
        run: sleep 60

      - name: Health check (liveness)
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://facteur-production.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Liveness check failed after 10 attempts"
          exit 1

      - name: Readiness check (database)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://facteur-production.up.railway.app/api/health/ready)
          if [ "$STATUS" = "200" ]; then
            echo "Readiness check passed (DB connected)"
          else
            echo "WARNING: Readiness check returned $STATUS (DB may not be ready)"
            exit 1
          fi

      - name: Environment check
        run: |
          RESPONSE=$(curl -sf https://facteur-production.up.railway.app/api/health) || {
            echo "FAIL: Could not reach health endpoint"
            exit 1
          }
          ENV=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('environment','unknown'))")
          if [ "$ENV" = "production" ]; then
            echo "Environment correctly reports: production"
          else
            echo "WARNING: Environment reports '$ENV' instead of 'production'"
          fi
