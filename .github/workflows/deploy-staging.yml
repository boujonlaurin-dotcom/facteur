name: Staging Smoke Tests

on:
  # Runs after merge to staging (Railway auto-deploys via webhook)
  push:
    branches: [staging]

  # Manual trigger
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deployment
        run: sleep 60

      - name: Health check (liveness)
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://facteur-staging.up.railway.app/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Liveness check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Liveness check failed after 10 attempts"
          exit 1

      - name: Readiness check (database)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://facteur-staging.up.railway.app/api/health/ready)
          if [ "$STATUS" = "200" ]; then
            echo "Readiness check passed (DB connected)"
          else
            echo "WARNING: Readiness check returned $STATUS (DB may not be ready)"
            exit 1
          fi

      - name: Environment check
        run: |
          RESPONSE=$(curl -sf https://facteur-staging.up.railway.app/api/health || echo "")
          if [ -z "$RESPONSE" ]; then
            echo "FAIL: Health endpoint returned empty or non-200 response"
            exit 1
          fi
          ENV=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('environment','unknown'))")
          if [ "$ENV" = "staging" ]; then
            echo "Environment correctly reports: staging"
          else
            echo "FAIL: Environment reports '$ENV' instead of 'staging'"
            exit 1
          fi
