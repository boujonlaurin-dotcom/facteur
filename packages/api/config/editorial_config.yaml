# Editorial Pipeline Configuration — Story 10.23
# Paramètres du pipeline de curation éditorialisée.

pipeline:
  subjects_count: 3              # Nombre de sujets dans le digest
  cluster_input_limit: 15        # Top N clusters envoyés au LLM
  deep_candidates_prefilter: 10  # Top N candidats deep avant LLM
  deep_required: false           # Sujet peut exister sans deep match
  actu_max_age_hours: 24         # Age max des articles actu
  deep_jaccard_threshold: 0.04   # Seuil Jaccard pour pré-filtre deep (bas pour maximiser les candidats LLM)

feature_flags:
  editorial_enabled: true        # TEST LOCAL — remettre false avant de commit/déployer
  editorial_user_ids: []         # Whitelist vide = tous les users (local seulement)

cost:
  max_llm_calls_per_batch: 10   # Safety cap LLM calls
