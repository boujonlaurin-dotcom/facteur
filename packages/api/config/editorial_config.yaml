# Editorial Pipeline Configuration — Story 10.23
# Paramètres du pipeline de curation éditorialisée.

pipeline:
  subjects_count: 5              # Nombre de sujets dans le digest
  cluster_input_limit: 15        # Top N clusters envoyés au LLM
  deep_candidates_prefilter: 10  # Top N candidats deep avant LLM
  deep_required: false           # Sujet peut exister sans deep match
  actu_max_age_hours: 24         # Age max des articles actu
  # Seuil Jaccard pour pré-filtre deep. Remonté de 0.04 → 0.08 en même
  # temps que la suppression du broader_fallback : avec un prompt LLM plus
  # strict et sans override déterministe, on préfère un pool réduit de
  # candidats pertinents plutôt qu'une liste longue polluée.
  deep_jaccard_threshold: 0.08
  # Ancienneté minimale d'un article "deep" pour être éligible comme
  # "Pas de recul". 24 h garantit qu'une dépêche du même matin (même si
  # publiée par une source deep) ne sera pas promue en mise en perspective.
  # Cf. docs/bugs/bug-digest-pas-de-recul-same-event.md.
  deep_min_age_hours: 24

cost:
  max_llm_calls_per_batch: 10   # Safety cap LLM calls
