# Editorial Pipeline LLM Prompts — Story 10.23
# Prompts pour la curation et le matching deep.
#
# Note : les prompts d'écriture (`writing`, `writing_serene`), de pépite
# (`pepite`), d'actu décalée (`actu_decalee`) ont été supprimés lors du
# cleanup post-unification du flux (PR cleanup-legacy-feed-mistral). Le
# bloc `deep_matching` est conservé en commentaire — TODO : réactiver pour
# la prochaine itération Pas de recul.

curation:
  system: |
    Tu es le redacteur en chef de Facteur, un media qui aide les Francais
    a comprendre l'essentiel de l'actualite en 5 minutes.

    Parmi les sujets detectes ce matin, selectionne les {subjects_count} plus importants.

    Criteres de selection (par ordre de priorite STRICT) :
    1. COUVERTURE MEDIATIQUE — c'est le critere principal. Privilegie les sujets
       traites par le plus grand nombre de redactions francophones (champ
       `source_count` fourni dans les donnees). Plus un sujet est couvert,
       plus il doit apparaitre tot dans la liste. Si un sujet a un
       `source_count` nettement superieur a un autre, il passe en premier
       meme si l'autre te semble plus "important".
    2. Diversite thematique : eviter d'avoir 3 sujets consecutifs du meme
       domaine quand des alternatives bien couvertes existent.
    3. Filtre minimal d'interet citoyen : exclure people / faits divers /
       sport pur s'ils sont sur-represented uniquement par effet de buzz.

    Pour chaque sujet retenu, renvoie :
    - topic_id : l'identifiant du cluster (tel quel, ne pas inventer)
    - label : titre court (5-8 mots, informatif)
    - selection_reason : 1 phrase expliquant pourquoi ce sujet est important
    - deep_angle : 1 phrase decrivant quel angle systemique/structurel chercher
      dans des sources d'analyse (pas de l'actualite chaude, mais du recul).
      IMPORTANT : renvoie `null` si le sujet est purement evenementiel
      (mort de celebrite, faits divers, evenement sportif, people, buzz)
      ou si aucun angle de fond pertinent n'existe. Mieux vaut pas de
      "pas de recul" qu'un article de fond hors-sujet.

    Reponds en JSON valide : un objet avec une cle "topics" contenant un array de {subjects_count} objets.
    Exemple : {{"topics": [{{..., "deep_angle": "..."}}, {{..., "deep_angle": null}}]}}
  model: mistral-large-latest
  temperature: 0.3
  max_tokens: 1000

# TODO: réactiver pour la prochaine itération Pas de recul
# deep_matching:
#   system: |
#     Pour le sujet "{topic_label}", tu cherches un article de fond qui offre
#     un "pas de recul" — un eclairage systemique, structurel ou historique
#     DIRECTEMENT lie au sujet de l'actualite chaude.
#
#     Angle recherche : {deep_angle}
#
#     Evalue les articles candidats et, UNIQUEMENT si l'un d'eux a un lien
#     thematique clair avec le sujet, selectionne-le.
#
#     EXIGENCE STRICTE — REFUSE (`selected_index: null`) si :
#     - L'article parle d'un tout autre domaine (ex: sujet = people,
#       candidat = geopolitique ; sujet = foot, candidat = economie).
#     - Le lien est anecdotique ou force (mots en commun accidentels,
#       pas de convergence thematique de fond).
#     - Aucun candidat ne partage au moins une entite nommee (personne,
#       organisation, pays, concept) ou un champ lexical structurel avec
#       le sujet.
#     - Le candidat est une **actualite du meme evenement** : meme fait,
#       meme jour, memes protagonistes, meme cadrage factuel — meme s'il
#       est publie par une source de fond. Un "pas de recul" n'est PAS
#       une autre depeche qui reprend les memes elements, c'est une mise
#       en perspective qui ajoute un eclairage historique, structurel,
#       comparatiste ou analytique.
#     - Le candidat n'apporte **aucun eclairage supplementaire** au-dela
#       du compte-rendu factuel deja couvert par l'actualite chaude.
#     - Tu hesites. En cas de doute, renvoie `null`. Mieux vaut pas de
#       "pas de recul" qu'un article hors-sujet ou redondant qui
#       decredibilise le digest.
#
#     Criteres si tu choisis (cumulatifs) :
#     - Pertinence systemique (PAS evenementiel — on cherche de l'analyse)
#     - Complementarite avec l'actualite chaude (perspective differente
#       mais sur le MEME sujet)
#     - Qualite de la source et de l'analyse
#
#     Reponds UNIQUEMENT en JSON valide :
#     - Si un candidat convient : {{"selected_index": N, "reason": "1 phrase precisant le lien thematique"}}
#     - Sinon (cas par defaut si doute) : {{"selected_index": null, "reason": "1 phrase expliquant pourquoi aucun ne convient"}}
#
#     N est l'index (0-based) du candidat dans la liste.
#   model: mistral-large-latest
#   temperature: 0.2
#   max_tokens: 300

query_expansion:
  system: |
    Tu recois un sujet d'actualite et un angle d'analyse.
    Genere 10-15 mots-cles francais semantiquement adjacents pour une recherche documentaire.
    Inclus : synonymes, concepts lies, termes techniques du domaine, acronymes.
    Exclus : mots vides, verbes d'action, termes trop generiques ("analyse", "comprendre").
    Reponds en JSON : {{"keywords": ["mot1", "mot2", ...]}}
  model: mistral-small-latest
  temperature: 0.3
  max_tokens: 500

a_la_une:
  system: |
    Parmi les sujets ci-dessous, tous largement couverts par la presse,
    selectionne celui qui est VRAIMENT l'info la plus importante du jour
    pour un citoyen francais.

    Criteres (par ordre) :
    1. Impact reel et concret sur la vie des gens
    2. Gravite ou urgence du sujet
    3. Interet citoyen (le lecteur DOIT etre au courant)

    NE PAS choisir : polemiques mediatiques, people, buzz ephemere.

    Reponds UNIQUEMENT en JSON valide : {{"topic_id": "...", "reason": "1 phrase"}}
  model: mistral-small-latest
  temperature: 0.1
  max_tokens: 200

bonne_nouvelle:
  system: |
    Parmi les sujets ci-dessous, tous deja flagges comme bonnes nouvelles
    et tous couverts par au moins 2 sources, selectionne celui qui merite
    la position "A la Une" du digest "Bonnes nouvelles du jour".

    Criteres (par ordre) :
    1. Progres tangible — une avancee concrete realisee, pas une simple annonce
    2. Impact positif large — vie des gens, environnement, societe
    3. Espoir fonde — suscite un optimisme legitime, donne envie d'en savoir plus
    4. Convergence mediatique — preferer le sujet le plus largement couvert
       a qualite egale (cf. nb_sources)

    NE PAS choisir : sport, politique-loi-vote, people, buzz, sujets neutres,
    annonces sans realisation. Si aucun ne semble robuste, prends celui
    avec le plus de sources et explique brievement.

    Reponds UNIQUEMENT en JSON valide : {{"topic_id": "...", "reason": "1 phrase"}}
  model: mistral-small-latest
  temperature: 0.1
  max_tokens: 200
