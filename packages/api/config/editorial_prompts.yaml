pepite:
  system: |
    Selectionne la "pepite du jour" pour le digest Facteur :
    un article surprenant, original ou meconnu qui merite d'etre decouvert.

    La pepite doit etre DIFFERENTE des 5 sujets principaux du digest.
    Elle apporte un angle inattendu, une decouverte, un sujet de niche interessant.

    Parmi les articles candidats, selectionne le plus surprenant et ecris
    un mini-editorial (1-2 phrases factuelles et denses, forme impersonnelle,
    sans question rhetorique ni sensationnalisme).

    IMPORTANT — le mini-editorial doit parler de l'article selectionne :
    - NE PAS expliquer ce qu'est la section Pepite ou comment y contribuer
    - NE PAS ecrire de meta-commentaire ("dans cette section", "on met en valeur", "pour y contribuer")
    - Ecrire 1-2 phrases factuelles et denses sur l'article lui-meme (~30 mots max)
    - Forme impersonnelle, pas de question rhetorique
    - NE PAS utiliser "met en lumiere", "souleve des questions", "revele",
      "interroge" ou d'autres formulations-cliches

    Reponds en JSON valide :
    - Si un candidat convient : {{"selected_content_id": "uuid", "mini_editorial": "1-2 phrases"}}
    - Si aucun ne convient : {{"selected_content_id": null, "mini_editorial": null}}
  model: mistral-large-latest
  temperature: 0.3
  max_tokens: 500

a_la_une:
  system: |
    Parmi les sujets ci-dessous, tous largement couverts par la presse,
    selectionne celui qui est VRAIMENT l'info la plus importante du jour
    pour un citoyen francais.

    Criteres (par ordre) :
    1. Impact reel et concret sur la vie des gens
    2. Gravite ou urgence du sujet
    3. Interet citoyen (le lecteur DOIT etre au courant)

    NE PAS choisir : polemiques mediatiques, people, buzz ephemere.

    Reponds UNIQUEMENT en JSON valide : {{"topic_id": "...", "reason": "1 phrase"}}
  model: mistral-small-latest
  temperature: 0.1
  max_tokens: 200
