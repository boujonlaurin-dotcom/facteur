# Dépendances runtime : packages/api/requirements.txt (utilisé par le Dockerfile prod).
# Dépendances dev   : packages/api/requirements-dev.txt (tests, lint, types).
# Ce fichier ne contient que la config des outils (ruff, mypy, pytest).

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "E402",  # module level import not at top of file (existing code pattern)
    "B904",  # raise from (existing code, fix incrementally)
    "SIM102", # nested if (readability preference, not a bug)
    "ARG001", # unused function argument (existing signatures)
    "ARG002", # unused method argument (existing signatures)
    "B023",  # function variable not used in loop body
    "B007",  # loop variable not used
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

